<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JustTap</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <button class="lang-toggle" onclick="toggleLanguage()"><i class="fa-solid fa-globe"></i></button>

        <div class="cover" id="cover-img"></div>
        <div class="avatar-container">
            <img src="" alt="Profile" class="avatar" id="profile-img">
        </div>

        <div class="info">
            <h1 id="name"></h1>
            <h3 id="job-title"></h3>
            <p id="bio"></p>
        </div>

        <div class="quick-actions">
            <a href="" id="link-phone" class="action"><i class="fa-solid fa-phone"></i></a>
            <a href="" id="link-email" class="action"><i class="fa-solid fa-envelope"></i></a>
        </div>

        <button class="btn-save" onclick="downloadVCard()">
            <i class="fa-solid fa-user-plus"></i> <span id="save-text"></span>
        </button>

        <div class="social-wrapper">
            <div class="socials" id="social-container"></div>
        </div>

        <div class="footer">
            <span id="powered-text"></span>
            <a href="https://jus-tt-ap.com" target="_blank">
                <img src="" alt="JustTap Logo" class="footer-logo" id="footer-logo-img">
            </a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
