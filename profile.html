<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الشخصي | JustTap</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* الـ CSS الخاص بك بدون تغيير */
        body { background-color: #f3f4f6; font-family: 'Cairo', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; align-items: flex-start; }
        .profile-card { background: #fff; width: 100%; max-width: 420px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; padding-bottom: 30px; margin-top: 20px; }
        .cover-img { width: 100%; height: 180px; background-color: #e5e7eb; background-size: cover; background-position: center; } .avatar-container { display: flex; justify-content: center; margin-top: -60px; } .avatar-img { width: 120px; height: 120px; border-radius: 50%; border: 5px solid #fff; object-fit: cover; background: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .info-section { text-align: center; padding: 15px 25px; } .info-section h1 { margin: 0; font-size: 24px; color: #111827; font-weight: 700; } .info-section .title { color: #4b5563; font-weight: 600; font-size: 15px; margin: 5px 0 2px; } .info-section .company { color: #9ca3af; font-size: 13px; margin: 0 0 15px; } .info-section .bio { color: #6b7280; font-size: 14px; line-height: 1.6; }
        .save-btn-container { padding: 0 25px; margin-top: 5px; } .save-btn { display: block; width: 100%; background: #000; color: #deff9a; text-align: center; padding: 15px; border-radius: 14px; font-weight: 700; font-size: 16px; border: none; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.1); } .save-btn:hover { background: #1f2937; transform: translateY(-2px); }
        .social-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 25px; } .social-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; color: #374151; background: #f9fafb; padding: 15px 10px; border-radius: 16px; transition: 0.3s; border: 1px solid #f3f4f6; } .social-btn:hover { background: #fff; border-color: #e5e7eb; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transform: translateY(-3px); } .social-btn i { font-size: 26px; margin-bottom: 8px; } .social-btn span { font-size: 11px; font-weight: 600; }
        .c-wa { color: #25D366; } .c-fb { color: #1877F2; } .c-ig { color: #E1306C; } .c-tt { color: #000000; } .c-li { color: #0A66C2; } .c-tw { color: #000000; } .c-sc { color: #FFFC00; text-shadow: 0 0 1px #000; } .c-yt { color: #FF0000; }
        .loading-state { text-align: center; padding: 100px 20px; color: #6b7280; width: 100%; max-width: 420px; background: #fff; border-radius: 24px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="loading-state" id="loading-spinner">
        <i class="fa-solid fa-spinner fa-spin fa-2x"></i>
        <p style="margin-top: 15px; font-weight: 600;">جاري تحميل الكارت...</p>
    </div>

    <div class="profile-card" id="profile-content" style="display: none;">
        <div class="cover-img" id="user-cover"></div>
        <div class="avatar-container">
            <img src="" alt="Avatar" class="avatar-img" id="user-avatar">
        </div>
        
        <div class="info-section">
            <h1 id="user-name"></h1>
            <div class="title" id="user-title"></div>
            <div class="company" id="user-company"></div>
            <div class="bio" id="user-bio"></div>
        </div>

        <div class="save-btn-container">
            <button class="save-btn" id="save-contact-btn"><i class="fa-solid fa-address-book"></i> حفظ في جهات الاتصال</button>
        </div>

        <div class="social-grid" id="social-links-container"></div>
    </div>

    <script type="module">
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
        import { db } from "./firebase-config.js";

        // تم توحيد البحث عن uid بالأساس 
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('uid') || urlParams.get('id');

        async function loadProfile() {
            if (!userId) {
                document.getElementById('loading-spinner').innerHTML = "<h3>عفواً، الكارت غير صالح أو الرابط ناقص.</h3>";
                return;
            }

            try {
                const docRef = doc(db, "users", userId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();

                    // 🌟 التعديل الجديد: تحديث عنوان الـ Tab باسم الشخص تلقائياً فور جلب البيانات 🌟
                    document.title = (data.name || "الملف الشخصي") + " | JustTap";

                    document.getElementById('user-name').innerText = data.name || 'عميل JustTap';
                    document.getElementById('user-title').innerText = data.title || '';
                    document.getElementById('user-company').innerText = data.company || '';
                    document.getElementById('user-bio').innerText = data.bio || '';

                    if (data.cover) document.getElementById('user-cover').style.backgroundImage = `url(${data.cover})`;
                    document.getElementById('user-avatar').src = data.avatar || 'https://via.placeholder.com/150';

                    const linksContainer = document.getElementById('social-links-container');
                    linksContainer.innerHTML = ''; // تفريغ الحاوية قبل الإضافة لتجنب التكرار
                    const links = data.links || {};
                    
                    const platforms = [
                        { id: 'whatsapp', icon: 'fa-whatsapp', colorClass: 'c-wa', name: 'واتساب', urlPrefix: 'https://wa.me/' },
                        { id: 'facebook', icon: 'fa-facebook-f', colorClass: 'c-fb', name: 'فيسبوك', urlPrefix: 'https://facebook.com/' },
                        { id: 'instagram', icon: 'fa-instagram', colorClass: 'c-ig', name: 'انستجرام', urlPrefix: 'https://instagram.com/' },
                        { id: 'tiktok', icon: 'fa-tiktok', colorClass: 'c-tt', name: 'تيك توك', urlPrefix: 'https://tiktok.com/@' },
                        { id: 'linkedin', icon: 'fa-linkedin-in', colorClass: 'c-li', name: 'لينكد إن', urlPrefix: 'https://linkedin.com/in/' },
                        { id: 'twitter', icon: 'fa-x-twitter', colorClass: 'c-tw', name: 'تويتر', urlPrefix: 'https://twitter.com/' },
                        { id: 'snapchat', icon: 'fa-snapchat', colorClass: 'c-sc', name: 'سناب شات', urlPrefix: 'https://snapchat.com/add/' },
                        { id: 'youtube', icon: 'fa-youtube', colorClass: 'c-yt', name: 'يوتيوب', urlPrefix: 'https://youtube.com/' }
                    ];

                    platforms.forEach(platform => {
                        if (links[platform.id]) {
                            let handle = links[platform.id].trim().replace(/\/$/, ""); 
                            handle = handle.substring(handle.lastIndexOf('/') + 1); 
                            const finalUrl = platform.urlPrefix + handle;
                            
                            const btnHTML = `
                                <a href="${finalUrl}" target="_blank" class="social-btn">
                                    <i class="fa-brands ${platform.icon} ${platform.colorClass}"></i>
                                    <span>${platform.name}</span>
                                </a>
                            `;
                            linksContainer.innerHTML += btnHTML;
                        }
                    });

                    document.getElementById('loading-spinner').style.display = 'none';
                    document.getElementById('profile-content').style.display = 'block';

                } else {
                    document.getElementById('loading-spinner').innerHTML = `
                        <h3>هذا الكارت جديد!</h3>
                        <p style="font-size: 14px; color: #666; margin-top: 10px;">
                            يرجى تسجيل الدخول إلى لوحة التحكم وحفظ بياناتك لتفعيل الكارت.
                        </p>
                    `;
                }
            } catch (error) {
                console.error("Error fetching document:", error);
                document.getElementById('loading-spinner').innerHTML = "<h3>حدث خطأ في جلب بيانات الكارت.</h3>";
            }
        }

        document.getElementById('save-contact-btn').addEventListener('click', () => {
            const name = document.getElementById('user-name').innerText;
            const title = document.getElementById('user-title').innerText;
            const company = document.getElementById('user-company').innerText;
            let vcfData = `BEGIN:VCARD\nVERSION:3.0\nN:;${name};;;\nFN:${name}\nORG:${company}\nTITLE:${title}\nEND:VCARD`;
            const blob = new Blob([vcfData], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${name}.vcf`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        loadProfile();
    </script>
</body>
</html>
