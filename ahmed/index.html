<div class="profile-card">
    <div class="banner">
        <img src="banner-placeholder.jpg" alt="Banner" id="user-banner">
    </div>

    <div class="profile-pic-container">
        <img src="profile-placeholder.jpg" alt="Profile Picture" id="user-img">
    </div>

    <div class="profile-info">
        <h2 id="user-name">Mohamed Kamel</h2>
        <p class="job-title" id="user-title">Programmer</p>
        <p class="company" id="user-company">Energya Company</p>
    </div>

    <div class="quick-actions">
        <a href="#" class="icon-btn" id="action-email"><i class="fas fa-envelope"></i></a>
        <a href="#" class="icon-btn" id="action-phone"><i class="fas fa-phone-alt"></i></a>
    </div>

    <button class="save-contact-btn" id="save-contact">Save Contact</button>

    <div class="social-links-container">
        <a href="#" class="social-item" id="link-whatsapp">
            <i class="fab fa-whatsapp"></i>
            <span>WhatsApp</span>
        </a>
        <a href="#" class="social-item" id="link-facebook">
            <i class="fab fa-facebook"></i>
            <span>Facebook</span>
        </a>
        <a href="#" class="social-item" id="link-instagram">
            <i class="fab fa-instagram"></i>
            <span>Instagram</span>
        </a>
        <a href="#" class="social-item" id="link-tiktok">
            <i class="fab fa-tiktok"></i>
            <span>TikTok</span>
        </a>
    </div>
</div>
