<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | JustTap</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #090d16;
            --bg-card: #111827;
            --bg-input: #1f2937;
            --accent: #deff9a;
            --accent-hover: #bce674;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
        }

        .logo { font-size: 32px; font-weight: 700; margin-bottom: 8px; color: #fff; }
        .logo span { color: var(--accent); }
        .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 35px; }

        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; text-align: right; }
        .input-group label { font-size: 14px; font-weight: 600; color: var(--text-muted); }
        
        .input-wrapper {
            display: flex;
            align-items: center;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0 15px;
            transition: 0.3s;
        }
        .input-wrapper:focus-within { border-color: var(--accent); box-shadow: 0 0 10px rgba(222, 255, 154, 0.1); }
        .input-wrapper i { color: var(--text-muted); font-size: 16px; }
        .input-wrapper input { background: transparent; border: none; flex: 1; padding: 14px 10px; color: #fff; outline: none; font-size: 14px; text-align: right; }

        .btn-login {
            background: var(--accent);
            color: #000;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(222, 255, 154, 0.2);
        }
        .btn-login:hover { background: var(--accent-hover); transform: translateY(-2px); }
        .btn-login:active { transform: translateY(0); }
        .btn-login:disabled { background: var(--text-muted); cursor: not-allowed; transform: none; box-shadow: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">Just<span>Tap</span></div>
        <div class="subtitle">سجل دخولك لتحديث بيانات كارتك الذكي فوراً</div>

        <form id="login-form">
            <div class="input-group">
                <label>البريد الإلكتروني للعميل</label>
                <div class="input-wrapper">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="login-email" required placeholder="name@example.com">
                </div>
            </div>

            <div class="input-group">
                <label>كلمة المرور</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
            </div>

            <button type="submit" class="btn-login" id="btn-submit">
                <i class="fa-solid fa-arrow-right-to-bracket"></i> دخول إلى لوحة التحكم
            </button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

        // إعدادات فايربيز (تأكد من وضع مفتاح الـ API الخاص بمشروعك هنا)
       const firebaseConfig = {
  apiKey: "AIzaSyAfpew-RjS5kUjpRK6SGpkCpetrioLL2oE",
  authDomain: "jus-tt-ap.firebaseapp.com",
  databaseURL: "https://jus-tt-ap-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "jus-tt-ap",
  storageBucket: "jus-tt-ap.firebasestorage.app",
  messagingSenderId: "602186980260",
  appId: "1:602186980260:web:940e78a048db2a656a3f31"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // الاستماع لحدث إرسال النموذج ومنع السلوك الافتراضي للمتصفح
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault(); // منع مسح البيانات وإعادة تحميل الصفحة فوراً
            
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري فتح اللوحة الفخمة...';

            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            try {
                // محاولة تسجيل الدخول عبر فايربيز
                await signInWithEmailAndPassword(auth, email, password);
                
                // التوجيه التلقائي إلى الداش بورد عند النجاح
                window.location.href = "dashboard.html";
            } catch (error) {
                console.error("Login Error: ", error);
                
                // إظهار تنبيه ذكي ومحدد للمستخدم بناءً على نوع الخطأ
                let alertMsg = "فشل الاتصال: تأكد من إعدادات الـ API Key";
                if (error.code === 'auth/wrong-password') {
                    alertMsg = "كلمة المرور التي أدخلتها غير صحيحة، حاول مجدداً.";
                } else if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                    alertMsg = "الحساب غير موجود، تأكد من البريد الإلكتروني أو قم بإنشائه من لوحة الأدمن أولاً.";
                } else if (error.code === 'auth/invalid-email') {
                    alertMsg = "صيغة البريد الإلكتروني غير صحيحة.";
                }
                
                alert(alertMsg);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-arrow-right-to-bracket"></i> دخول إلى لوحة التحكم';
            }
        });
    </script>
</body>
</html>
