<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | JustTap</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #090d16;
            --bg-card: #111827;
            --bg-input: #1f2937;
            --accent: #deff9a;
            --accent-hover: #bce674;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.05);
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); min-height: 100vh; padding: 30px 20px; }

        .container { max-width: 1000px; margin: 0 auto; }
        
        /* الهيدر */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        .logo { font-size: 28px; font-weight: 700; color: #fff; }
        .logo span { color: var(--accent); }
        .btn-logout { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 8px 16px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-logout:hover { background: var(--danger); color: #fff; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 30px; }
        
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; }
        .card-title { font-size: 18px; font-weight: 700; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; color: #fff; }
        .card-title i { color: var(--accent); }

        /* تقسيم الخانات */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 14px; font-weight: 600; color: var(--text-muted); }
        .input-group input, .input-group textarea { background: var(--bg-input); border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: #fff; outline: none; font-size: 14px; transition: 0.3s; }
        .input-group input:focus, .input-group textarea:focus { border-color: var(--accent); }
        
        /* السوشيال ميديا */
        .social-section-title { font-size: 16px; font-weight: 700; margin: 30px 0 15px; color: var(--accent); border-bottom: 1px dashed var(--border); padding-bottom: 10px; }
        
        .social-input-wrapper { display: flex; align-items: center; background: var(--bg-input); border: 1px solid var(--border); border-radius: 12px; padding: 0 15px; margin-bottom: 15px; }
        .social-input-wrapper i { font-size: 18px; width: 30px; }
        .social-input-wrapper input { background: transparent; border: none; flex: 1; padding: 14px 10px; color: #fff; outline: none; font-size: 14px; }

        /* الألوان الخاصة بأيقونات السوشيال */
        .fa-whatsapp { color: #25D366; } .fa-instagram { color: #E1306C; } .fa-tiktok { color: #fff; }
        .fa-linkedin { color: #0A66C2; } .fa-x-twitter { color: #fff; } .fa-youtube { color: #FF0000; } .fa-snapchat { color: #FFFC00; }

        /* زر الحفظ الكبير */
        .btn-save { background: var(--accent); color: #000; border: none; width: 100%; padding: 16px; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; box-shadow: 0 10px 25px rgba(222, 255, 154, 0.15); margin-top: 20px; }
        .btn-save:hover { background: var(--accent-hover); transform: translateY(-2px); }
        .btn-save:disabled { background: var(--text-muted); cursor: not-allowed; transform: none; box-shadow: none; }

        /* حالة التحميل للشاشة كلها */
        .screen-loader { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg-main); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>

    <div class="screen-loader" id="screen-loader">
        <i class="fa-solid fa-spinner fa-spin fa-3x" style="color: var(--accent);"></i>
        <p style="margin-top: 20px; color: var(--text-muted); font-weight: 600;">جاري تأمين الاتصال باللوحة الفخمة...</p>
    </div>

    <div class="container">
        <header>
            <div class="logo">Just<span>Tap</span> لوحة التحكم</div>
            <button class="btn-logout" id="btn-logout"><i class="fa-solid fa-arrow-right-from-bracket"></i> تسجيل الخروج</button>
        </header>

        <main class="dashboard-grid">
            <div class="card">
                <div class="card-title"><i class="fa-solid fa-user-pen"></i> تعديل بيانات الكارت الذكي</div>
                
                <form id="dashboard-form">
                    <div class="form-grid">
                        <div class="input-group">
                            <label>اسم العميل</label>
                            <input type="text" id="user-name" required placeholder="مثال: محمد أحمد">
                        </div>
                        <div class="input-group">
                            <label>المسمى الوظيفي</label>
                            <input type="text" id="user-title" placeholder="مثال: مدير مشاريع">
                        </div>
                    </div>

                    <div class="form-grid">
                        <div class="input-group">
                            <label>الشركة / المنشأة</label>
                            <input type="text" id="user-company" placeholder="مثال: شركة أرامكو السعودية">
                        </div>
                    </div>

                    <div class="input-group" style="margin-bottom: 25px;">
                        <label>نبذة عنك (Bio)</label>
                        <textarea id="user-bio" rows="3" placeholder="اكتب نبذة مختصرة عن خبراتك..."></textarea>
                    </div>

                    <div class="social-section-title">صورة الملف الشخصي والغلاف</div>
                    <div class="form-grid">
                        <div class="input-group">
                            <label>الصورة الشخصية (Avatar)</label>
                            <input type="file" id="upload-avatar" accept="image/*">
                        </div>
                        <div class="input-group">
                            <label>صورة الغلاف (Cover)</label>
                            <input type="file" id="upload-cover" accept="image/*">
                        </div>
                    </div>

                    <div class="social-section-title">شبكة روابط الاتصال والتواصل الاجتماعي</div>
                    <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 15px;">اكتب اسم المستخدم (Username) فقط أو رقم الهاتف في خانة الواتساب.</p>

                    <div class="social-input-wrapper">
                        <i class="fa-brands fa-whatsapp"></i>
                        <input type="text" id="link-whatsapp" placeholder="رقم الواتساب بالصيغة الدولية (مثال: 9665xxxxxxxx)">
                    </div>

                    <div class="social-input-wrapper">
                        <i class="fa-brands fa-instagram"></i>
                        <input type="text" id="link-instagram" placeholder="اسم المستخدم على انستجرام">
                    </div>

                    <div class="social-input-wrapper">
                        <i class="fa-brands fa-tiktok"></i>
                        <input type="text" id="link-tiktok" placeholder="اسم المستخدم على تيك توك">
                    </div>

                    <div class="social-input-wrapper">
                        <i class="fa-brands fa-linkedin"></i>
                        <input type="text" id="link-linkedin" placeholder="اسم المستخدم على لينكد إن">
                    </div>

                    <div class="social-input-wrapper">
                        <i class="fa-brands fa-x-twitter"></i>
                        <input type="text" id="link-twitter" placeholder="اسم المستخدم على منصة X">
                    </div>

                    <div class="social-input-wrapper">
                        <i class="fa-brands fa-snapchat"></i>
                        <input type="text" id="link-snapchat" placeholder="اسم المستخدم على سناب شات">
                    </div>

                    <div class="social-input-wrapper">
                        <i class="fa-brands fa-youtube"></i>
                        <input type="text" id="link-youtube" placeholder="اسم أو معرف القناة على يوتيوب">
                    </div>

                    <button type="submit" class="btn-save" id="btn-save">
                        <i class="fa-solid fa-floppy-disk"></i> حفظ البيانات الفخمة
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        // ⚠️ ضع هنا بيانات مشروعك الحقيقية بالكامل لتفعيل الربط الفوري
     const firebaseConfig = {
  apiKey: "AIzaSyAfpew-RjS5kUjpRK6SGpkCpetrioLL2oE",
  authDomain: "jus-tt-ap.firebaseapp.com",
  databaseURL: "https://jus-tt-ap-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "jus-tt-ap",
  storageBucket: "jus-tt-ap.firebasestorage.app",
  messagingSenderId: "602186980260",
  appId: "1:602186980260:web:940e78a048db2a656a3f31"
};


        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUID = null;
        let base64Avatar = "";
        let base64Cover = "";

        // التحقق من حالة تسجيل الدخول وجلب البيانات القديمة إن وجدت
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUID = user.uid;
                try {
                    const docRef = doc(db, "users", currentUID);
                    const docSnap = await getDoc(docRef);

                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        
                        // تعبئة النصوص
                        document.getElementById('user-name').value = data.name || "";
                        document.getElementById('user-title').value = data.title || "";
                        document.getElementById('user-company').value = data.company || "";
                        document.getElementById('user-bio').value = data.bio || "";
                        
                        // حفظ الصور القديمة في الذاكرة لمنع مسحها عند الحفظ بدون رفع جديد
                        base64Avatar = data.avatar || "";
                        base64Cover = data.cover || "";

                        // تعبئة روابط السوشيال ميديا
                        if (data.links) {
                            document.getElementById('link-whatsapp').value = data.links.whatsapp || "";
                            document.getElementById('link-instagram').value = data.links.instagram || "";
                            document.getElementById('link-tiktok').value = data.links.tiktok || "";
                            document.getElementById('link-linkedin').value = data.links.linkedin || "";
                            document.getElementById('link-twitter').value = data.links.twitter || "";
                            document.getElementById('link-snapchat').value = data.links.snapchat || "";
                            document.getElementById('link-youtube').value = data.links.youtube || "";
                        }
                    }
                } catch (err) {
                    console.error("Error fetching user data:", err);
                } finally {
                    // إخفاء شاشة التحميل بعد التعبئة
                    document.getElementById('screen-loader').style.display = 'none';
                }
            } else {
                // لو مش مسجل دخول يرجعه لصفحة اللوجن فوراً
                window.location.href = "login.html";
            }
        });

        // تحويل الصور المرفوعة إلى صيغة Base64 لقراءتها فوراً بدون بروتوكولات معقدة
        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        document.getElementById('upload-avatar').addEventListener('change', async (e) => {
            if (e.target.files[0]) base64Avatar = await toBase64(e.target.files[0]);
        });

        document.getElementById('upload-cover').addEventListener('change', async (e) => {
            if (e.target.files[0]) base64Cover = await toBase64(e.target.files[0]);
        });

        // عملية الحفظ الذكية المستهدفة (Set + Merge)
        document.getElementById('dashboard-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!currentUID) return alert("خطأ في تحديد هوية المستخدم!");

            const btnSave = document.getElementById('btn-save');
            btnSave.disabled = true;
            btnSave.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري حفظ البيانات الفخمة...';

            const updatedData = {
                name: document.getElementById('user-name').value.trim(),
                title: document.getElementById('user-title').value.trim(),
                company: document.getElementById('user-company').value.trim(),
                bio: document.getElementById('user-bio').value.trim(),
                avatar: base64Avatar,
                cover: base64Cover,
                links: {
                    whatsapp: document.getElementById('link-whatsapp').value.trim(),
                    instagram: document.getElementById('link-instagram').value.trim(),
                    tiktok: document.getElementById('link-tiktok').value.trim(),
                    linkedin: document.getElementById('link-linkedin').value.trim(),
                    twitter: document.getElementById('link-twitter').value.trim(),
                    snapchat: document.getElementById('link-snapchat').value.trim(),
                    youtube: document.getElementById('link-youtube').value.trim()
                }
            };

            try {
                const docRef = doc(db, "users", currentUID);
                
                // التعديل السحري هنا: إنشاء الكارت لو مش موجود، وتحديثه لو موجود بـ merge
                await setDoc(docRef, updatedData, { merge: true });
                
                alert("تم حفظ وتحديث بيانات الكارت بنجاح يا هندسة! 🎉");
            } catch (error) {
                console.error("Save Error:", error);
                alert("حدث خطأ أثناء الحفظ: " + error.message);
            } finally {
                btnSave.disabled = false;
                btnSave.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> حفظ البيانات الفخمة';
            }
        });

        // تفعيل زر تسجيل الخروج
        document.getElementById('btn-logout').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            });
        });
    </script>
</body>
</html>
