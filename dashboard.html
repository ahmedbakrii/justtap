<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | JustTap</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #090d16;
            --bg-card: #111827;
            --bg-input: #1f2937;
            --accent: #deff9a;
            --accent-hover: #bce674;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.05);
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); min-height: 100vh; padding: 15px; }

        .container { max-width: 1100px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border); gap: 10px; }
        .logo { font-size: 22px; font-weight: 700; color: #fff; }
        .logo span { color: var(--accent); }
        .btn-logout { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 6px 12px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.3s; white-space: nowrap; }
        .btn-logout:hover { background: var(--danger); color: #fff; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 380px; gap: 20px; align-items: start; }
        
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; }
        .card-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: #fff; }
        .card-title i { color: var(--accent); }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-size: 13px; font-weight: 600; color: var(--text-muted); }
        .input-group input, .input-group textarea { background: var(--bg-input); border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: #fff; outline: none; font-size: 13px; width: 100%; transition: 0.3s; }
        .input-group input:focus, .input-group textarea:focus { border-color: var(--accent); }
        
        .section-title { font-size: 14px; font-weight: 700; margin: 25px 0 12px; color: var(--accent); border-bottom: 1px dashed var(--border); padding-bottom: 8px; }
        
        .social-input-wrapper { display: flex; align-items: center; background: var(--bg-input); border: 1px solid var(--border); border-radius: 10px; padding: 0 12px; margin-bottom: 12px; }
        .social-input-wrapper i { font-size: 16px; width: 25px; text-align: center; }
        .social-input-wrapper input { background: transparent; border: none; flex: 1; padding: 12px 8px; color: #fff; outline: none; font-size: 13px; width: 100%; }

        .fa-whatsapp { color: #25D366; } .fa-instagram { color: #E1306C; } .fa-tiktok { color: #fff; }
        .fa-linkedin { color: #0A66C2; } .fa-x-twitter { color: #fff; } .fa-youtube { color: #FF0000; } .fa-snapchat { color: #FFFC00; }

        .btn-save { background: var(--accent); color: #000; border: none; width: 100%; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 15px; }
        .btn-save:hover { background: var(--accent-hover); }
        .btn-save:disabled { background: var(--text-muted); cursor: not-allowed; }

        .preview-sticky { position: sticky; top: 20px; }
        .phone-mockup { background: #fff; color: #111827; border-radius: 24px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 4px solid #374151; min-height: 500px; padding-bottom: 20px; }
        .p-cover { width: 100%; height: 120px; background: #e5e7eb; background-size: cover; background-position: center; }
        .p-avatar-box { display: flex; justify-content: center; margin-top: -45px; }
        .p-avatar { width: 90px; height: 90px; border-radius: 50%; border: 4px solid #fff; object-fit: cover; background: #fff; }
        .p-info { text-align: center; padding: 10px 15px; }
        .p-name { font-size: 18px; font-weight: 700; color: #111827; margin-bottom: 2px; }
        .p-title { font-size: 13px; font-weight: 600; color: #4b5563; }
        .p-company { font-size: 11px; color: #9ca3af; margin-bottom: 8px; }
        .p-bio { font-size: 12px; color: #6b7280; line-height: 1.5; padding: 0 10px; }
        .p-btn { display: block; background: #000; color: #deff9a; text-align: center; padding: 10px; border-radius: 10px; margin: 12px 20px; font-size: 13px; font-weight: 700; }
        .p-social-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 10px 20px; }
        .p-social-icon { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; background: #f3f4f6; border-radius: 50%; font-size: 18px; text-decoration: none; display: none; }

        .screen-loader { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg-main); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }

        @media (max-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr; } 
            body { padding: 10px; }
            .card { padding: 15px; border-radius: 15px; }
            header { margin-bottom: 15px; }
            .logo { font-size: 18px; }
            .preview-sticky { position: static; order: -1; margin-bottom: 25px; } 
        }
    </style>
</head>
<body>

    <div class="screen-loader" id="screen-loader">
        <i class="fa-solid fa-spinner fa-spin fa-2x" style="color: var(--accent);"></i>
        <p style="margin-top: 15px; color: var(--text-muted); font-weight: 600; font-size: 14px;">جاري تأمين الاتصال باللوحة الفخمة...</p>
    </div>

    <div class="container">
        <header>
            <div class="logo">Just<span>Tap</span> اللوحة المرنة</div>
            <button class="btn-logout" id="btn-logout"><i class="fa-solid fa-arrow-right-from-bracket"></i> خروج</button>
        </header>

        <main class="dashboard-grid">
            
            <div class="card">
                <div class="card-title"><i class="fa-solid fa-user-pen"></i> تعديل بيانات كارتك الذكي</div>
                
                <form id="dashboard-form">
                    <div class="form-grid">
                        <div class="input-group">
                            <label>اسم العميل</label>
                            <input type="text" id="user-name" required placeholder="الاسم بالكامل">
                        </div>
                        <div class="input-group">
                            <label>المسمى الوظيفي</label>
                            <input type="text" id="user-title" placeholder="مثال: مدير إدارة">
                        </div>
                    </div>

                    <div class="form-grid">
                        <div class="input-group">
                            <label>الشركة / المنشأة</label>
                            <input type="text" id="user-company" placeholder="اسم الشركة">
                        </div>
                    </div>

                    <div class="input-group">
                        <label>نبذة عنك (Bio)</label>
                        <textarea id="user-bio" rows="2" placeholder="اكتب نبذة مختصرة عنك..."></textarea>
                    </div>

                    <div class="section-title">رفع الصور الشخصية والغلاف</div>
                    <div class="form-grid">
                        <div class="input-group">
                            <label>الصورة الشخصية (Avatar)</label>
                            <input type="file" id="upload-avatar" accept="image/*">
                        </div>
                        <div class="input-group">
                            <label>صورة الغلاف (Cover)</label>
                            <input type="file" id="upload-cover" accept="image/*">
                        </div>
                    </div>

                    <div class="section-title">شبكة روابط التواصل الاجتماعي</div>
                    
                    <div class="social-input-wrapper">
                        <i class="fa-brands fa-whatsapp"></i>
                        <input type="text" id="link-whatsapp" placeholder="رقم الواتساب بالصيغة الدولية">
                    </div>

                    <div class="social-input-wrapper">
                        <i class="fa-brands fa-instagram"></i>
                        <input type="text" id="link-instagram" placeholder="اليوزر نيم على انستجرام">
                    </div>

                    <div class="social-input-wrapper">
                        <i class="fa-brands fa-tiktok"></i>
                        <input type="text" id="link-tiktok" placeholder="اليوزر نيم على تيك توك">
                    </div>

                    <div class="social-input-wrapper">
                        <i class="fa-brands fa-linkedin"></i>
                        <input type="text" id="link-linkedin" placeholder="اليوزر نيم على لينكد إن">
                    </div>

                    <div class="social-input-wrapper">
                        <i class="fa-brands fa-x-twitter"></i>
                        <input type="text" id="link-twitter" placeholder="اليوزر نيم على تويتر">
                    </div>

                    <div class="social-input-wrapper">
                        <i class="fa-brands fa-snapchat"></i>
                        <input type="text" id="link-snapchat" placeholder="اليوزر نيم على سناب شات">
                    </div>

                    <div class="social-input-wrapper">
                        <i class="fa-brands fa-youtube"></i>
                        <input type="text" id="link-youtube" placeholder="معرف القناة على يوتيوب">
                    </div>

                    <button type="submit" class="btn-save" id="btn-save">
                        <i class="fa-solid fa-floppy-disk"></i> حفظ وتحديث البيانات
                    </button>
                </form>
            </div>

            <div class="preview-sticky">
                <div style="font-size: 14px; font-weight: 700; margin-bottom: 10px; color: var(--text-muted); display: flex; align-items: center; gap: 5px;">
                    <i class="fa-solid fa-mobile-screen-button" style="color: var(--accent);"></i> معاينة حية للكارت الفعلي:
                </div>
                
                <div class="phone-mockup">
                    <div class="p-cover" id="p-cover-view"></div>
                    <div class="p-avatar-box">
                        <img src="https://via.placeholder.com/150" class="p-avatar" id="p-avatar-view">
                    </div>
                    <div class="p-info">
                        <div class="p-name" id="p-name-view">اسم العميل</div>
                        <div class="p-title" id="p-title-view">المسمى الوظيفي</div>
                        <div class="p-company" id="p-company-view">اسم الشركة المنشأة</div>
                        <div class="p-bio" id="p-bio-view">النبذة الشخصية تظهر هنا بشكل أنيق ومتناسق...</div>
                    </div>
                    
                    <div class="p-btn"><i class="fa-solid fa-address-book"></i> حفظ في جهات الاتصال</div>
                    
                    <div class="p-social-grid">
                        <a id="pv-whatsapp" class="p-social-icon" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
                        <a id="pv-instagram" class="p-social-icon" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                        <a id="pv-tiktok" class="p-social-icon" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
                        <a id="pv-linkedin" class="p-social-icon" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
                        <a id="pv-twitter" class="p-social-icon" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
                        <a id="pv-snapchat" class="p-social-icon" target="_blank"><i class="fa-brands fa-snapchat"></i></a>
                        <a id="pv-youtube" class="p-social-icon" target="_blank"><i class="fa-brands fa-youtube"></i></a>
                    </div>
                </div>
            </div>

        </main>
    </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    // تم إضافة setDoc هنا للتعامل مع العملاء الجدد بمرونة
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    // ⚠️ ضع بيانات مشروعك هنا ⚠️
   const firebaseConfig = {
  apiKey: "AIzaSyAfpew-RjS5kUjpRK6SGpkCpetrioLL2oE",
  authDomain: "jus-tt-ap.firebaseapp.com",
  databaseURL: "https://jus-tt-ap-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "jus-tt-ap",
  storageBucket: "jus-tt-ap.firebasestorage.app",
  messagingSenderId: "602186980260",
  appId: "1:602186980260:web:940e78a048db2a656a3f31"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUserUid = null;
    let avatarBase64 = "";
    let coverBase64 = "";

    // 1️⃣ دالة تحويل الصور مع فحص الحجم (الحد الأقصى 1 ميجا)
    function handleImageUpload(inputId, type) {
        const input = document.getElementById(inputId);
        if (!input) return; // عشان لو الحقل مش موجود الكود ميقفش
        
        input.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                // منع رفع صورة أكبر من 1 ميجابايت لتفادي كراش الداتابيز
                if (file.size > 1048487) {
                    alert("⚠️ حجم الصورة كبير جداً! الحد الأقصى 1 ميجابايت. يرجى اختيار صورة أصغر.");
                    input.value = ""; // تفريغ الحقل
                    return;
                }

                const reader = new FileReader();
                reader.onloadend = () => {
                    if(type === 'avatar') avatarBase64 = reader.result;
                    if(type === 'cover') coverBase64 = reader.result;
                };
                reader.readAsDataURL(file);
            }
        });
    }

    // تأكد إن الـ IDs دي نفس اللي في ملف الـ HTML عندك
    handleImageUpload('avatar', 'avatar'); // استبدل 'avatar' بـ ID حقل الصورة الشخصية
    handleImageUpload('cover', 'cover');   // استبدل 'cover' بـ ID حقل الغلاف

    // 2️⃣ مراقبة تسجيل الدخول مع ضمان إخفاء شاشة التحميل دائماً
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUserUid = user.uid;
            try {
                const docRef = doc(db, "users", currentUserUid);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    // توزيع البيانات على الحقول (تأكد من مطابقة الـ IDs)
                    if(document.getElementById('name')) document.getElementById('name').value = data.name || "";
                    if(document.getElementById('title')) document.getElementById('title').value = data.title || "";
                    if(document.getElementById('company')) document.getElementById('company').value = data.company || "";
                    
                    if(document.getElementById('whatsapp')) document.getElementById('whatsapp').value = data.whatsapp || "";
                    if(document.getElementById('instagram')) document.getElementById('instagram').value = data.instagram || "";
                    if(document.getElementById('tiktok')) document.getElementById('tiktok').value = data.tiktok || "";
                    if(document.getElementById('x')) document.getElementById('x').value = data.x || "";
                    if(document.getElementById('snapchat')) document.getElementById('snapchat').value = data.snapchat || "";
                    if(document.getElementById('youtube')) document.getElementById('youtube').value = data.youtube || "";
                    
                    // الاحتفاظ بالصور القديمة لو العميل مرفعش صور جديدة
                    if(data.avatar) avatarBase64 = data.avatar;
                    if(data.cover) coverBase64 = data.cover;
                } else {
                    console.log("عميل جديد، سيتم إنشاء ملفه عند الحفظ.");
                }
            } catch (error) {
                console.error("خطأ أثناء جلب البيانات:", error);
            } finally {
                // السطر السحري اللي هيقفل شاشة التحميل مهما حصل
                const loader = document.getElementById('loader'); // استبدل 'loader' بـ ID شاشة التحميل عندك
                if(loader) loader.style.display = 'none';
            }
        } else {
            // طرد المستخدم لصفحة الدخول لو مش مسجل
            window.location.href = "login.html";
        }
    });

    // 3️⃣ حفظ البيانات بذكاء (إنشاء أو دمج)
    const saveBtn = document.getElementById('save-btn'); // استبدل 'save-btn' بـ ID زرار الحفظ
    if(saveBtn) {
        saveBtn.addEventListener('click', async () => {
            saveBtn.innerHTML = 'جاري الحفظ...';
            saveBtn.disabled = true;

            const updatedData = {
                name: document.getElementById('name') ? document.getElementById('name').value : "",
                title: document.getElementById('title') ? document.getElementById('title').value : "",
                company: document.getElementById('company') ? document.getElementById('company').value : "",
                whatsapp: document.getElementById('whatsapp') ? document.getElementById('whatsapp').value : "",
                instagram: document.getElementById('instagram') ? document.getElementById('instagram').value : "",
                tiktok: document.getElementById('tiktok') ? document.getElementById('tiktok').value : "",
                x: document.getElementById('x') ? document.getElementById('x').value : "",
                snapchat: document.getElementById('snapchat') ? document.getElementById('snapchat').value : "",
                youtube: document.getElementById('youtube') ? document.getElementById('youtube').value : "",
                avatar: avatarBase64,
                cover: coverBase64,
                updatedAt: new Date()
            };

            try {
                const docRef = doc(db, "users", currentUserUid);
                // استخدام setDoc مع { merge: true } يحل مشكلة No document to update نهائياً
                await setDoc(docRef, updatedData, { merge: true });
                
                alert("تم حفظ البيانات الفخمة بنجاح!");
            } catch (error) {
                console.error("خطأ أثناء الحفظ:", error);
                alert("حدث خطأ أثناء الحفظ! يرجى المحاولة مرة أخرى.");
            } finally {
                saveBtn.innerHTML = 'حفظ البيانات الفخمة';
                saveBtn.disabled = false;
            }
        });
    }
</script>
